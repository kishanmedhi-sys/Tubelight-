<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Tubelight</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* Flower Scenery Background */
            background-image: url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Added a semi-transparent 'glass' effect so the text pops against the flowers */
        .container {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            border: 2px solid rgba(255, 182, 193, 0.6);
        }

        h1 {
            color: #ff4d6d;
            font-size: 2.2rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .gif-container img {
            width: 220px;
            height: 220px;
            object-fit: cover; /* Ensures real photos aren't stretched */
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            min-height: 100px; 
        }

        button {
            padding: 15px 35px;
            font-size: 1.3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-weight: bold;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            position: relative;
        }

        .success-message {
            display: none;
            background: rgba(255, 255, 255, 0.9);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .success-message h1 {
            font-size: 3.5rem;
            text-shadow: 0 0 10px #fff, 0 0 20px #ff4d6d;
        }

        .glow {
            text-shadow: 0 0 8px #ffd700;
            color: #d4af37;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="gif-container">
            <img src="https://i.postimg.cc/Nfztzqqz/images.jpg" alt="Our Photo">
        </div>
        <h1>Can I have you forever, <span class="glow">Tubelight</span>? 💡❤️</h1>
        <div class="buttons">
            <button id="yesBtn">YES!</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <div class="success-message" id="successMsg">
        <h1>I knew it! ❤️</h1>
        <p style="font-size: 1.5rem; color: #ff4d6d;">You're stuck with me now!</p>
        <img src="https://i.ibb.co/fVQwqxbg/images.png" alt="Be Happy">
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const mainContainer = document.getElementById('mainContainer');
        const successMsg = document.getElementById('successMsg');

        let yesScale = 1;

        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'absolute';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            yesScale += 0.4;
            yesBtn.style.transform = `scale(${yesScale})`;
        });

        yesBtn.addEventListener('click', () => {
            mainContainer.style.display = 'none';
            successMsg.style.display = 'block';
        });
    </script>
</body>
</html>
